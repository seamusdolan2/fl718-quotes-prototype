      }

      function entranceNavMap(quote, cb) {
        var isLong = isLongQuote(quote);

        // Convert to nm-line spans for measurement and progressive reveal
        var lines = quote.text.split('\n');
        quoteEl.innerHTML = lines.map(function (line) {
          return '<span class="fl718-nm-line">' + line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>';
        }).join('');

        // Set individual element opacities to 0 before entrance
        gsap.set([footerEl, ruleTopEl, ruleBotEl], { opacity: 0 });

        // Long quote: breath-on-glass fallback
        if (isLong) {
          var longLineSpans = Array.from(quoteEl.querySelectorAll('.fl718-nm-line'));
          gsap.set(longLineSpans, { opacity: 1 });
          gsap.set(block, { opacity: 0, filter: 'blur(8px)' });
          gsap.to(block, {
            filter: 'blur(0px)', opacity: 1, duration: 1.8, ease: 'power1.out',
            onComplete: function () {
              gsap.to([footerEl, ruleTopEl, ruleBotEl], { opacity: 1, duration: 0.5, stagger: 0.08 });
              nmDelay(cb, 600);
            }
          });
          return;
        }

        // Double rAF: ensures layout settles before measuring line positions
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            var W = window.innerWidth, H = window.innerHeight;
            var color = nmTextColor();

            var roseX = Math.round(W * 0.21);
            var roseY = Math.round(H * 0.50);
            var roseR = Math.min(Math.round(Math.min(W, H) * 0.056), 60);

            // Measure line groups
            gsap.set(block, { opacity: 1 });
            var lineSpans  = Array.from(quoteEl.querySelectorAll('.fl718-nm-line'));
            var MAX_GROUPS = 5;
            var groups;
            if (lineSpans.length <= MAX_GROUPS) {
              groups = lineSpans.map(function (s) { return [s]; });
            } else {
              var gSize = Math.ceil(lineSpans.length / MAX_GROUPS);
              groups = [];
              for (var g = 0; g < lineSpans.length; g += gSize) {
                groups.push(lineSpans.slice(g, g + gSize));
              }
            }

            var groupData = groups.map(function (spanArr) {
              var tops    = spanArr.map(function (s) { return s.getBoundingClientRect().top; });
              var bottoms = spanArr.map(function (s) { return s.getBoundingClientRect().bottom; });
              var lefts   = spanArr.map(function (s) { return s.getBoundingClientRect().left; });
              var rights  = spanArr.map(function (s) { return s.getBoundingClientRect().right; });
              return {
                spans: spanArr,
                cx: (Math.min.apply(null, lefts) + Math.max.apply(null, rights)) / 2,
                cy: (Math.min.apply(null, tops)  + Math.max.apply(null, bottoms)) / 2
              };
            });

            gsap.set(block, { opacity: 0 });

            // Clear and rebuild SVG
            while (navMapSvg.firstChild) navMapSvg.removeChild(navMapSvg.firstChild);

            var vintageG = nmBuildVintageMapLayer(navMapSvg, W, H);

            // Coordinate grid
            var gridG = nmSvgEl('g', { id: 'fl718-nm-grid', opacity: '0' });
            var mxX   = Math.round(W / 7), mxY = Math.round(H / 5);
            var monoStyle = 'font-family:DM Mono,monospace;font-size:7.5px;';
            for (var gx = 0; gx <= W + mxX; gx += mxX) {
              gridG.appendChild(nmSvgEl('line', { x1: gx, y1: 0, x2: gx, y2: H, stroke: color, 'stroke-width': '0.50', opacity: '0.18' }));
            }
            for (var gy = 0; gy <= H + mxY; gy += mxY) {
              gridG.appendChild(nmSvgEl('line', { x1: 0, y1: gy, x2: W, y2: gy, stroke: color, 'stroke-width': '0.50', opacity: '0.18' }));
            }
            for (var lgy = mxY; lgy < H; lgy += mxY) {
              var lt = nmSvgEl('text', { x: 6, y: lgy, 'dominant-baseline': 'middle', fill: color, opacity: '0.32', style: monoStyle });
              lt.textContent = String(Math.round(lgy)).padStart(4, '0');
              gridG.appendChild(lt);
            }
            for (var lgx = mxX * 2; lgx < W; lgx += mxX * 2) {
              var lt2 = nmSvgEl('text', { x: lgx, y: 11, 'text-anchor': 'middle', fill: color, opacity: '0.28', style: monoStyle });
              lt2.textContent = String(Math.round(lgx)).padStart(4, '0');
              gridG.appendChild(lt2);
            }
            navMapSvg.appendChild(gridG);

            var roseG = nmBuildCompassRose(navMapSvg, roseX, roseY, roseR, color);

            // Rhumb lines
            var rhumbG = nmSvgEl('g', { id: 'fl718-nm-rhumb', opacity: '0' });
            var rhumbAngles = [-Math.PI / 2, -Math.PI / 4, 0, Math.PI / 4, Math.PI / 2, 3 * Math.PI / 4, Math.PI, -3 * Math.PI / 4];
            rhumbAngles.forEach(function (ang) {
              var rdx = Math.cos(ang), rdy = Math.sin(ang);
              var rtX = rdx > 0 ? (W + 50 - roseX) / rdx : rdx < 0 ? (-50 - roseX) / rdx : 99999;
              var rtY = rdy > 0 ? (H + 50 - roseY) / rdy : rdy < 0 ? (-50 - roseY) / rdy : 99999;
              rhumbG.appendChild(nmSvgEl('line', {
                x1: roseX, y1: roseY,
                x2: roseX + rdx * Math.min(rtX, rtY), y2: roseY + rdy * Math.min(rtX, rtY),
                stroke: color, 'stroke-width': '0.22', opacity: '0.09'
              }));
            });
            navMapSvg.appendChild(rhumbG);

            var bearingG = nmSvgEl('g', { id: 'fl718-nm-bearings' });
            navMapSvg.appendChild(bearingG);
            var rippleG = nmSvgEl('g', { id: 'fl718-nm-ripples' });
            navMapSvg.appendChild(rippleG);

            // Build bearing paths
            var BEARING_DUR = 0.88, BEARING_GAP = 0.60, T_START = 1.55;

            var bearingData = groupData.map(function (gd, gi) {
              var dx   = gd.cx - roseX, dy = gd.cy - roseY;
              var dist = Math.sqrt(dx * dx + dy * dy);
              var ndx  = dx / dist, ndy = dy / dist;
              var curveMag  = dist * 0.10;
              var curveSign = (gi % 2 === 0) ? 1 : -1;
              var cpX = roseX + dx * 0.50 + (-ndy * curveMag * curveSign);
              var cpY = roseY + dy * 0.50 + ( ndx * curveMag * curveSign);
              var tX   = ndx > 0 ? (W + 70 - roseX) / ndx : ndx < 0 ? (-70 - roseX) / ndx : 99999;
              var tY   = ndy > 0 ? (H + 70 - roseY) / ndy : ndy < 0 ? (-70 - roseY) / ndy : 99999;
              var tEdge = Math.min(tX, tY);
              var endX  = roseX + ndx * tEdge, endY = roseY + ndy * tEdge;
              var pathD = 'M ' + roseX + ' ' + roseY + ' Q ' + cpX + ' ' + cpY + ' ' + endX + ' ' + endY;
              var path = nmSvgEl('path', { d: pathD, fill: 'none', stroke: color, 'stroke-width': '0.95', 'stroke-linecap': 'round', opacity: '0' });
              bearingG.appendChild(path);
              var pathLen = path.getTotalLength();
              var tGroup = Math.abs(dx) >= Math.abs(dy)
                ? Math.max(0.12, Math.min(0.84, (gd.cx - roseX) / (endX - roseX)))
                : Math.max(0.12, Math.min(0.84, (gd.cy - roseY) / (endY - roseY)));
              var labelPt = path.getPointAtLength(pathLen * 0.20);
              path.setAttribute('stroke-dasharray',  pathLen + ' ' + pathLen);
              path.setAttribute('stroke-dashoffset', pathLen);
              return { path: path, pathLen: pathLen, tGroup: tGroup, center: gd, spans: gd.spans, bearing: nmToBearing(gd.cx - roseX, gd.cy - roseY), labelPt: labelPt, gi: gi };
            });

            // Animate layers
            gsap.to(vintageG, { opacity: 1, duration: 0.80, ease: 'power1.out' });
            gsap.to(gridG,    { opacity: 1, duration: 0.50, ease: 'power1.out' });
            gsap.set(roseG, { svgOrigin: roseX + ' ' + roseY, rotation: -180, scale: 0.05 });
            gsap.to(roseG, { opacity: 1, rotation: 0, scale: 1, duration: 0.88, ease: 'power3.out', delay: 0.28 });
            gsap.to(rhumbG, { opacity: 1, duration: 0.55, ease: 'power1.out', delay: 0.95 });

            var lastRevealTime = T_START;

            bearingData.forEach(function (bd, bi) {
              var lineStartTime = T_START + bi * BEARING_GAP;
              var revealTime    = lineStartTime + bd.tGroup * BEARING_DUR;
              if (revealTime > lastRevealTime) lastRevealTime = revealTime;

              nmDelay(function () {
                gsap.set(bd.path, { opacity: 0.58 });
                bd.path.setAttribute('stroke-dashoffset', bd.pathLen);
                gsap.to(bd.path, { attr: { 'stroke-dashoffset': 0 }, duration: BEARING_DUR, ease: 'none' });
                var labelEl = nmSvgEl('text', {
                  x: bd.labelPt.x + 6, y: bd.labelPt.y - 5,
                  fill: color, opacity: '0',
                  style: 'font-family:DM Mono,monospace;font-size:7px;letter-spacing:0.08em;'
                });
                labelEl.textContent = bd.bearing;
                bearingG.appendChild(labelEl);
                gsap.to(labelEl, { opacity: 0.35, duration: 0.45, ease: 'power1.out', delay: 0.30 });
              }.bind(null, bd), lineStartTime * 1000);

              nmDelay(function () {
                if (bd.gi === 0) gsap.to(block, { opacity: 1, duration: 0.25, ease: 'power1.out' });
                [
                  { maxR: 18, sw: 1.0, op: 0.48, dur: 0.55, delay: 0 },
                  { maxR: 32, sw: 0.6, op: 0.28, dur: 0.80, delay: 140 }
                ].forEach(function (rc) {
                  nmDelay(function () {
                    var ripple = nmSvgEl('circle', { cx: bd.center.cx, cy: bd.center.cy, r: '0', fill: 'none', stroke: color, 'stroke-width': rc.sw, opacity: rc.op });
                    rippleG.appendChild(ripple);
                    gsap.to(ripple, { attr: { r: rc.maxR }, opacity: 0, duration: rc.dur, ease: 'power1.out' });
                  }, rc.delay);
                });
                bd.spans.forEach(function (span, si) {
                  gsap.fromTo(span, { opacity: 0, y: 5 }, { opacity: 1, y: 0, duration: 0.48, ease: 'power1.out', delay: si * 0.06 });
                });
              }.bind(null, bd), revealTime * 1000);
            });

            var attrTime = lastRevealTime + 0.62;
            nmDelay(function () {
              gsap.to([ruleTopEl, ruleBotEl], { opacity: 1, duration: 0.55, ease: 'power1.out', stagger: 0.12 });
              gsap.to(footerEl, { opacity: 1, duration: 0.55, ease: 'power1.out', delay: 0.14 });
            }, attrTime * 1000);

            nmDelay(cb, (attrTime + 0.80) * 1000);
          });
        });
      }

      // ================================================================
      // ETCH-A-SKETCH
      // ================================================================

      function injectEtchFrame() {
        var frame = document.createElement('div');
        frame.id  = 'fl718-etch-frame';
        frame.setAttribute('aria-hidden', 'true');
        frame.innerHTML =
          '<div id="fl718-etch-screen"><canvas id="fl718-etch-canvas"></canvas></div>' +
          '<div class="fl718-etch-knob" id="fl718-knob-left" aria-hidden="true"></div>' +
          '<div class="fl718-etch-knob" id="fl718-knob-right" aria-hidden="true"></div>' +
          '<div id="fl718-etch-brand" aria-hidden="true">Etch A Sketch</div>';
        document.getElementById('fl718-quotes-root').appendChild(frame);
        etchFrameEl   = frame;
        etchScreenEl  = frame.querySelector('#fl718-etch-screen');
        etchCanvas    = frame.querySelector('#fl718-etch-canvas');
        etchCtx       = etchCanvas.getContext('2d');
        etchKnobLeft  = frame.querySelector('#fl718-knob-left');
        etchKnobRight = frame.querySelector('#fl718-knob-right');
      }

      function removeEtchFrame() {
        if (etchFrameEl && etchFrameEl.parentNode) etchFrameEl.parentNode.removeChild(etchFrameEl);
        etchFrameEl = etchScreenEl = etchCanvas = etchCtx = etchKnobLeft = etchKnobRight = null;
      }

      function setupEtchCanvas() {
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        etchSW = etchScreenEl.clientWidth;
        etchSH = etchScreenEl.clientHeight;
        etchCanvas.width  = Math.round(etchSW * dpr);
        etchCanvas.height = Math.round(etchSH * dpr);
        etchCanvas.style.width  = etchSW + 'px';
        etchCanvas.style.height = etchSH + 'px';
        etchCtx.setTransform(1, 0, 0, 1, 0, 0);
        etchCtx.scale(dpr, dpr);
        etchCtx.fillStyle = SCREEN_COLOR;
        etchCtx.fillRect(0, 0, etchSW, etchSH);
      }

      function clearEtchCanvas() {
        etchCtx.fillStyle = SCREEN_COLOR;
        etchCtx.fillRect(0, 0, etchSW, etchSH);
      }

      function computeEtchLines(text, maxW, fontSize) {
        etchCtx.font = fontSize + 'px "DM Mono", monospace';
        var lines = [];
        text.split('\n').forEach(function (para) {
          if (para.trim() === '') { lines.push(''); return; }
          var words = para.split(' '), line = '';
          words.forEach(function (word) {
            var test = line ? line + ' ' + word : word;
            if (etchCtx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
            else { line = test; }
          });
          if (line) lines.push(line);
        });
        return lines;
      }

      function computeEtchFontSize(text, padX, maxH) {
        var maxW = etchSW - padX * 2;
        for (var size = 18; size >= 10; size--) {
          if (computeEtchLines(text, maxW, size).length * size * 1.95 <= maxH) return size;
        }
        return 10;
      }

      function buildCharSequence(q) {
        var padX     = Math.round(etchSW * 0.085);
        var padY     = Math.round(etchSH * 0.10);
        var maxW     = etchSW - padX * 2;
        var maxH     = etchSH * 0.68;
        var fontSize = computeEtchFontSize(q.text, padX, maxH);
        var lineH    = fontSize * 1.95;
        var attrSize = Math.max(10, Math.round(fontSize * 0.70));
        etchCtx.font = fontSize + 'px "DM Mono", monospace';
        var quoteLines = computeEtchLines(q.text, maxW, fontSize);
        var seq = [], y = padY + fontSize;
        quoteLines.forEach(function (line) {
          if (line === '') { y += Math.round(lineH * 0.5); return; }
          etchCtx.font = fontSize + 'px "DM Mono", monospace';
          var x = padX;
          for (var i = 0; i < line.length; i++) {
            seq.push({ ch: line[i], x: x, y: y, size: fontSize, isAttr: false });
            x += etchCtx.measureText(line[i]).width;
          }
          y += lineH;
        });
        y += Math.round(lineH * 0.7);
        var attrText = q.attribution + (q.source ? '   ' + q.source : '');
        etchCtx.font = attrSize + 'px "DM Mono", monospace';
        var ax = padX;
        for (var i = 0; i < attrText.length; i++) {
          seq.push({ ch: attrText[i], x: ax, y: y, size: attrSize, isAttr: true });
          ax += etchCtx.measureText(attrText[i]).width;
        }
        return seq;
      }

      function etchCharDelay(ch, isAttr) {
        if (isAttr) return 22 + Math.random() * 14;
        if (ch === '.' || ch === '?' || ch === '!') return 180 + Math.random() * 60;
        if (ch === ',' || ch === ';' || ch === ':') return 110 + Math.random() * 50;
        if (ch === '\u2014' || ch === '—')          return 140 + Math.random() * 40;
        if (ch === ' ')                              return 52  + Math.random() * 28;
        if (Math.random() < 0.06)                   return 80  + Math.random() * 120;
        return 36 + Math.random() * 20;
      }

      function updateEtchKnobs(entry, prevEntry) {
        if (!prevEntry) return;
        var dx = entry.x - prevEntry.x, dy = entry.y - prevEntry.y;
        if (Math.abs(dx) > 0) {
          rightKnobDeg += dx * 0.6;
          gsap.to(etchKnobRight, { rotation: rightKnobDeg, duration: 0.10, ease: 'none', overwrite: true });
        }
        if (Math.abs(dy) > 2) {
          leftKnobDeg += dy * 0.85;
          gsap.to(etchKnobLeft, { rotation: leftKnobDeg, duration: 0.12, ease: 'none', overwrite: true });
        }
      }

      function runEtchDrawLoop(seq, idx, cb) {
        if (!drawingActive) return;
        if (idx >= seq.length) { cb(); return; }
        var entry = seq[idx], prevEntry = idx > 0 ? seq[idx - 1] : null;
        etchCtx.font = entry.size + 'px "DM Mono", monospace';
        etchCtx.fillStyle    = entry.isAttr ? ATTR_COLOR : INK_COLOR;
        etchCtx.textAlign    = 'left';
        etchCtx.textBaseline = 'alphabetic';
        etchCtx.fillText(entry.ch, entry.x, entry.y);
        updateEtchKnobs(entry, prevEntry);
        var delay = etchCharDelay(entry.ch, entry.isAttr);
        if (!entry.isAttr && idx + 1 < seq.length && seq[idx + 1].isAttr) delay += 700;
        drawTimer = setTimeout(function () { runEtchDrawLoop(seq, idx + 1, cb); }, delay);
      }

      function etchDraw(quote, cb) {
        rightKnobDeg = 0; leftKnobDeg = 0;
        gsap.set([etchKnobLeft, etchKnobRight], { rotation: 0 });
        gsap.set(etchFrameEl, { y: '-112vh', opacity: 1, pointerEvents: 'none' });
        gsap.to(etchFrameEl, {
          y: 0, duration: 0.60, ease: 'power3.out',
          onComplete: function () {
            gsap.to(etchFrameEl, {
              y: -5, duration: 0.10, ease: 'power1.out', yoyo: true, repeat: 1,
              onComplete: function () {
                setupEtchCanvas();
                drawingActive = true;
                runEtchDrawLoop(buildCharSequence(quote), 0, function () {
                  setTimeout(cb, 350);
                });
              }
            });
          }
        });
      }

      function etchShakeExit(cb) {
        drawingActive = false;
        if (drawTimer) { clearTimeout(drawTimer); drawTimer = null; }
        var tl = gsap.timeline(), pos = 0;
        var shakeData = [
          { amp: 4, dur: 0.062 }, { amp: 7, dur: 0.068 }, { amp: 10, dur: 0.072 },
          { amp: 14, dur: 0.078 }, { amp: 18, dur: 0.082 }, { amp: 22, dur: 0.086 }
        ];
        shakeData.forEach(function (s, i) {
          var dir = (i % 2 === 0) ? 1 : -1;
          tl.to(etchFrameEl, { x: s.amp * dir, duration: s.dur, ease: 'sine.inOut' }, pos);
          pos += s.dur;
          tl.to(etchFrameEl, { x: 0, duration: s.dur * 0.65, ease: 'sine.out' }, pos);
          pos += s.dur * 0.65;
        });
        tl.call(clearEtchCanvas, [], pos - 0.10);
        tl.to([etchKnobLeft, etchKnobRight], { rotation: '+=48', duration: pos * 0.9, ease: 'power1.in' }, 0.08);
        tl.to(etchFrameEl, { y: '-112vh', duration: 0.46, ease: 'power2.in' }, pos + 0.04);
        tl.call(function () {
          gsap.set(etchFrameEl, { x: 0, y: 0, opacity: 0 });
          removeEtchFrame();
          cb();
        });
      }

      function telegraphEntrance(cb) {
        gsap.set(block, { opacity: 1 });
        gsap.set([nameEl, sourceEl], { opacity: 0 });
        var raw = quoteEl.textContent, chars = raw.split('');
        quoteEl.innerHTML = '';
        chars.forEach(function (ch) {
          var s = document.createElement('span');
          s.textContent = ch;
          gsap.set(s, { opacity: 0 });
          quoteEl.appendChild(s);
        });
        var spans = Array.from(quoteEl.querySelectorAll('span')), t = 0;
        spans.forEach(function (span, i) {
          var ch = chars[i], d;
          if (ch === '.' || ch === ',') { d = 90 + Math.random() * 80; }
          else if (ch === ' ') { d = Math.random() < 0.14 ? 90 + Math.random() * 100 : 30 + Math.random() * 22; }
          else { d = 28 + Math.random() * 38; if (Math.random() < 0.07) d += 100 + Math.random() * 140; }
          t += d;
          (function (s, ms) {
            var timer = setTimeout(function () { gsap.set(s, { opacity: 1 }); }, ms);
            telegraphTimers.push(timer);
          })(span, t);
        });
        var endTimer = setTimeout(function () {
          gsap.to([nameEl, sourceEl], { opacity: 1, duration: 0.4 });
          setTimeout(cb, 400);
        }, t + 180);
        telegraphTimers.push(endTimer);
      }

      function telegraphExit(cb) {
        telegraphTimers.forEach(clearTimeout);
        telegraphTimers = [];
        gsap.to([nameEl, sourceEl], { opacity: 0, duration: 0.14 });
        gsap.to(block, {
          opacity: 0, duration: 0.28, ease: 'power1.in',
          onComplete: function () { gsap.set(block, { opacity: 0 }); cb(); }
        });
      }

      function exitEtchSketch(cb) {
        if (prevWasLong) { telegraphExit(cb); return; }
        etchShakeExit(cb);
      }

      function entranceEtchSketch(quote, cb) {
        gsap.set(block, { opacity: 0 });
        var useLong = isLongQuote(quote);
        prevWasLong = useLong;

        if (prefersReducedMotion) {
          if (useLong) { gsap.to(block, { opacity: 1, duration: 0.5, onComplete: cb }); }
          else {
            injectEtchFrame();
            setupEtchCanvas();
            buildCharSequence(quote).forEach(function (e) {
              etchCtx.font = e.size + 'px "DM Mono", monospace';
              etchCtx.fillStyle = e.isAttr ? ATTR_COLOR : INK_COLOR;
              etchCtx.textAlign = 'left'; etchCtx.textBaseline = 'alphabetic';
              etchCtx.fillText(e.ch, e.x, e.y);
            });
            gsap.set(etchFrameEl, { opacity: 1 });
            setTimeout(cb, 300);
          }
          return;
        }

        if (useLong) {
          telegraphEntrance(cb);
        } else {
          document.fonts.ready.then(function () {
            injectEtchFrame();
            etchDraw(quote, cb);
          });
        }
      }

      // ================================================================
      // INPUT HANDLERS
      // ================================================================

      var wheelCooldown = false;
      window.addEventListener('wheel', function () {
        if (wheelCooldown) return;
        wheelCooldown = true;
        setTimeout(function () { wheelCooldown = false; }, 150);
        transition();
      }, { passive: true });

      var touchStartY = 0;
      window.addEventListener('touchstart', function (e) {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      window.addEventListener('touchend', function (e) {
        if (Math.abs(touchStartY - e.changedTouches[0].clientY) >= 50) transition();
      }, { passive: true });

      window.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === ' ') {
          e.preventDefault();
          transition();
        }
      });

      // ================================================================
      // INIT
      // ================================================================

      function init() {
        deck         = buildDeck();
        currentIndex = deck.shift();
        currentQuote = fl718Quotes[currentIndex];
        renderQuote(currentQuote);

        // First quote arrives with its own entrance animation
        isTransitioning = true;
        runEntrance(currentQuote, function () {
          isTransitioning = false;
          hintEl.classList.add('is-visible');
        });
      }

      init();

    })();
  </script>
